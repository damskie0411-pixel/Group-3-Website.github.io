  <button id="startButton">Play</button>
</div>
  <h1>ML Counter Card Game</h1>

  <h2>Score: <span id="score">0</span></h2>
  <h2>Lives: <span id="lives">3</span></h2>

  <h2>Your Cards</h2>
  <div id="playerCards" class="cards"></div>

  <p id="result"></p>

<div id="gameOver" style="display: none;">
  <h3 class="lose-glow">💀 Game Over! <br>
  <span id="finalScore"></span>
  <br>
  <button id="playAgain" onclick="resetGame()">Play Again</button>
</div> 

<div id="winScreen" class="overlay">
  <h4 class="win-glow">🏆 You Win! <br>
  <span>Your Score: <span id="winScore"></span></span><br><br>
  <button onclick="resetGame()">Play Again</button>
</div>
